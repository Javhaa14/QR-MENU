version: "3.9"

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/qrmenu}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PUBLIC_MENU_BASE_URL: ${PUBLIC_MENU_BASE_URL:-http://localhost:3000}
    depends_on:
      - mongodb
    ports:
      - "3001:3001"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - .env
    environment:
      API_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mongo-data:
